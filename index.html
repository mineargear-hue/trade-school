<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trade School — Plumbing & Auto Training</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#111;color:#ddd;font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px;}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:#161616;border-top:2px solid #222;display:flex;z-index:100;}
.nav-btn{flex:1;padding:10px 0 12px;background:none;border:none;color:#555;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-btn.active{color:var(--accent);}
.nav-btn span.ico{font-size:18px;}

/* HEADER */
#header{background:#161616;border-bottom:2px solid #222;padding:0;position:sticky;top:0;z-index:50;}
.header-inner{padding:10px 16px;display:flex;align-items:center;gap:10px;}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1;}
.logo-sub{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;}

/* TRADE SWITCHER */
.trade-bar{display:flex;border-top:1px solid #1e1e1e;overflow-x:auto;}
.trade-bar::-webkit-scrollbar{display:none;}
.trade-btn{flex-shrink:0;padding:8px 10px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:#555;display:flex;align-items:center;gap:5px;white-space:nowrap;border-bottom:3px solid transparent;transition:color 0.15s;}
.trade-btn.active{color:#fff;background:#1a1a1a;}
.trade-btn.active.plumb{border-bottom-color:#4a9eca;}
.trade-btn.active.auto{border-bottom-color:#e05c1a;}
.trade-btn.active.elec{border-bottom-color:#f0d030;}
.trade-btn.active.niag{border-bottom-color:#30c8a0;}
.trade-btn.active.carp{border-bottom-color:#c87941;}
.trade-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* CSS VARIABLES per trade */
body.plumb{--accent:#4a9eca;--notes-bg:#1e1e14;--notes-border:#44440a;--notes-color:#aa9;--daily-color:#e0c03a;}
body.auto{--accent:#e05c1a;--notes-bg:#1e1508;--notes-border:#55330a;--notes-color:#c98;--daily-color:#e05c1a;}
body.elec{--accent:#f0d030;--notes-bg:#1e1c08;--notes-border:#555208;--notes-color:#d4c840;--daily-color:#f0d030;}
body.niag{--accent:#30c8a0;--notes-bg:#081e18;--notes-border:#0a4432;--notes-color:#50d8b0;--daily-color:#30c8a0;}
body.carp{--accent:#c87941;--notes-bg:#1e1408;--notes-border:#553a10;--notes-color:#c8a060;--daily-color:#c87941;}

/* TABS */
.tab{display:none;padding:16px;}
.tab.active{display:block;}

/* CARDS */
.card{background:#181818;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;margin-bottom:12px;}
.card-hdr{background:#1e1e1e;padding:12px 16px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
.daily-meta{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--daily-color);letter-spacing:2px;}
.daily-inner{display:flex;gap:14px;align-items:flex-start;padding:16px;}
.play-btn{background:var(--accent);border:none;border-radius:10px;padding:12px 16px;color:#111;font-size:26px;cursor:pointer;flex-shrink:0;line-height:1;}
.daily-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;line-height:1.2;}
.daily-sub{color:#888;font-size:12px;margin-top:4px;}
.daily-desc{color:#777;font-size:12px;margin-top:8px;line-height:1.5;}
.btn-open{margin-top:12px;background:var(--accent);border:none;border-radius:6px;padding:10px 18px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.stat-box{background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:14px 10px;text-align:center;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;}
.stat-lbl{color:#666;font-size:10px;margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mod-card{background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:14px;cursor:pointer;}
.mod-card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#ddd;margin-top:6px;line-height:1.2;}
.prog-bar-bg{background:#222;border-radius:4px;height:5px;margin-top:10px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width 0.4s;}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-lbl{color:#555;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.filter-btn{background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#888;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;}
.filter-btn.active{background:var(--accent);color:#111;border-color:var(--accent);}
.mod-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#181818;border-radius:10px;border:1px solid #2a2a2a;cursor:pointer;margin-bottom:2px;}
.mod-hdr.open{border-radius:10px 10px 0 0;}
.mod-hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#fff;flex:1;}
.lesson-list{border:1px solid #2a2a2a;border-top:none;border-radius:0 0 10px 10px;background:#151515;padding:10px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.lesson-card{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;}
.lcheck{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:900;border-width:2px;border-style:solid;}
.ltitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#eee;line-height:1.3;}
.lmeta{color:#666;font-size:11px;margin-top:3px;}
.ldesc{color:#777;font-size:11px;margin-top:5px;line-height:1.5;}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:#000e;z-index:200;align-items:center;justify-content:center;padding:12px;}
#modal.open{display:flex;}
.modal-inner{background:#1a1a1a;border-radius:12px;width:100%;max-width:500px;border:1px solid #333;overflow:hidden;max-height:92vh;overflow-y:auto;}
.modal-hdr{padding:14px 16px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;position:sticky;top:0;background:#1a1a1a;z-index:1;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;line-height:1.3;flex:1;}
.modal-close{background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.modal-body{padding:14px 16px;}
.modal-dur{color:#888;font-size:12px;margin-bottom:6px;}
.modal-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.modal-desc{color:#aaa;font-size:13px;line-height:1.6;margin-bottom:12px;}
.modal-notes{background:var(--notes-bg);border:1px solid var(--notes-border);border-radius:8px;padding:12px;margin-bottom:14px;}
.modal-notes-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--notes-color);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.modal-notes-body{color:#ccc;font-size:12px;line-height:1.7;}
.modal-notes-body li{margin-left:14px;margin-bottom:4px;}
.yt-btn{display:block;background:#FF0000;color:#fff !important;text-decoration:none;text-align:center;padding:15px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1px;border-radius:8px;margin-bottom:10px;}
.mark-btn{display:block;width:100%;background:#252525;border:1px solid #444;color:#aaa;text-align:center;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;border-radius:8px;cursor:pointer;}
.mark-btn.done{background:#1a3a1a;border-color:#4a7a4a;color:#7bc47f;}

/* QUIZ */
.quiz-hdr{background:#222;padding:14px 18px;border-bottom:1px solid #2a2a2a;}
.quiz-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:var(--accent);letter-spacing:1px;}
.quiz-sub{color:#666;font-size:12px;margin-top:2px;}
.quiz-body{padding:16px;display:flex;flex-direction:column;gap:18px;}
.q-text{color:#ddd;font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4;}
.q-opt{background:#222;border:1px solid #333;border-radius:6px;padding:10px 14px;cursor:pointer;color:#bbb;font-size:13px;margin-bottom:6px;line-height:1.4;}
.q-opt.sel{background:#252520;border-color:var(--accent);color:var(--accent);}
.q-opt.correct{background:#1a3a1a;border-color:#4a9a4a;color:#7bc47f;}
.q-opt.wrong{background:#3a1a1a;border-color:#9a4a4a;color:#e07b7b;}
.sub-btn{background:var(--accent);border:none;border-radius:8px;padding:14px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:1px;width:100%;}
.sub-btn:disabled{background:#333;color:#555;cursor:not-allowed;}
.result-box{text-align:center;padding:18px;border-radius:8px;}
.result-txt{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-top:8px;}
.done-box{background:#1a2a1a;border:1px solid #4a7a4a;border-radius:10px;padding:20px;text-align:center;margin-bottom:12px;}
.past-q{background:#181818;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.badge{border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-width:1px;border-style:solid;}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.overall{background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:18px;margin-bottom:12px;}
.prog-card{background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.chip{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border-width:1px;border-style:solid;cursor:pointer;}
.reset-btn{background:none;border:1px solid #444;border-radius:8px;padding:12px;color:#666;font-size:13px;cursor:pointer;width:100%;margin-top:6px;}

/* COMBINED PROGRESS */
.combined-bar{background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:12px;}
.combined-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.combined-tile{border-radius:8px;padding:14px;text-align:center;}
</style>
</head>
<body class="plumb">

<div id="header">
  <div class="header-inner">
    <span id="header-icon" style="font-size:22px">🔧</span>
    <div style="flex:1">
      <div class="logo-title">TRADE SCHOOL</div>
      <div class="logo-sub" id="header-sub">FM&O Plumbing Training</div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#555;text-align:right;letter-spacing:1px;">COMBINED<br>PLATFORM</div>
  </div>
  <div class="trade-bar">
    <button class="trade-btn plumb active" id="btn-plumb" onclick="switchTrade('plumb')"><div class="trade-pip" style="background:#4a9eca"></div>🔧 PIPE</button>
    <button class="trade-btn auto" id="btn-auto" onclick="switchTrade('auto')"><div class="trade-pip" style="background:#e05c1a"></div>🔩 GREASE</button>
    <button class="trade-btn elec" id="btn-elec" onclick="switchTrade('elec')"><div class="trade-pip" style="background:#f0d030"></div>⚡ ELECTRIC</button>

  </div>
</div>

<div id="tab-home" class="tab active"></div>
<div id="tab-learn" class="tab"></div>
<div id="tab-quiz" class="tab"></div>
<div id="tab-progress" class="tab"></div>

<div id="modal">
  <div class="modal-inner">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-dur" id="modal-dur"></div>
      <div id="modal-badge"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div id="modal-notes"></div>
      <a id="yt-link" href="#" target="_blank" class="yt-btn">▶ &nbsp;WATCH ON YOUTUBE</a>
      <div id="no-video" style="display:none;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px;color:#666;font-size:12px;text-align:center;">No video — use the technical notes above</div>
      <button id="mark-btn" class="mark-btn" onclick="markDone()">✓ &nbsp;MARK AS COMPLETE</button>
    </div>
  </div>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="showTab('home',this)"><span class="ico">🏠</span>HOME</button>
  <button class="nav-btn" onclick="showTab('learn',this)"><span class="ico">📚</span>LEARN</button>
  <button class="nav-btn" onclick="showTab('quiz',this)"><span class="ico">📝</span>QUIZ</button>
  <button class="nav-btn" onclick="showTab('progress',this)"><span class="ico">📊</span>PROGRESS</button>
</div>

      notes:["Schedules write at priority 15 — a manual override at priority 8 overrides the schedule (lower number = higher priority)","Holiday calendar: create a CalendarComponent, add dates, link it to the schedule's holiday input","Test your schedule before leaving the site — check the next scheduled change and verify it occurs correctly","A schedule with no output configured still runs — it writes null, and lower priorities take over"]},

      notes:["Interval logging: logs a value every N seconds regardless of change — good for slowly changing values","COV (Change of Value): logs only when value changes by more than a deadband — efficient for binary points","History capacity: calculate how many points × logging interval × retention days fit — overflow loses old data","Connect to a Supervisor or analytics platform for long-term retention and analytics"]},

      notes:["Proxy point status: green = OK, yellow = stale (no recent communication), red = fault or down","Stale status: the driver has not received a fresh value — check device is powered on and communicating","Fox connection (Workbench to JACE): fox:// protocol on port 1911 — firewall must allow this","Application Director: Services > AppDirector — shows all running applications, lets you restart components without rebooting","Log files: Platform > AppDaemon > Log — download and search for error messages on startup failures"]},
    {id:"nt2",title:"BACnet & Modbus Communication Failures",level:"refresher",dur:"15 min",desc:"BACnet network diagnostics — who-is/i-am protocol, BBMD configuration for routed networks, MS/TP bus timing, duplicate device instance diagnosis.",vid:"",
      notes:["If BACnet discovery finds no devices: check device instance range, subnet broadcast, and that UDP 47808 is not blocked","BBMD: required when BACnet/IP devices are on different subnets — one BBMD per subnet","MS/TP bus speed must be identical for all devices — one wrong device at 19200 on a 38400 bus takes down the whole bus","Duplicate device instances: two devices with the same instance causes both to respond — you see intermittent data from both"]},

      notes:["Nominal vs actual: a 2x4 is 1-1/2\" × 3-1/2\". A 2x10 is 1-1/2\" × 9-1/4\". Design to actual dimensions","KD (kiln-dried) lumber is required for most interior framing — green lumber shrinks and warps after installation","Lumber grade stamps: species, grade, moisture content, mill number. No.2 is standard for wall framing; No.1 or better for headers","Always check your local span tables — lumber species varies by region and affects what sizes are allowed for a given span","Crown up: always install joists and rafters with the crown (bow) facing up. Gravity and load will push it down over time"]},
    {id:"cf2",title:"Wall Framing — Plates, Studs, Headers & Corners",level:"new",dur:"20 min",desc:"Bottom plate, top plate, double top plate, stud spacing (16\" and 24\" OC), rough opening sizes for doors and windows, king studs, jack studs (trimmers), cripples, corners and partition tees.",vid:"Z7bFOqSCZyo",
      notes:["Rough opening: door RO = door width + 2\" (for frame). Window RO = window width + 2\" wide, window height + 2\" tall — verify with manufacturer","King stud runs full height. Jack stud (trimmer) supports the header. Cripple studs fill above and below the opening","Double top plate: the lap joint on the double top plate must span across wall intersections to tie the framing together","California corner vs 3-stud corner: California corner uses 2 studs + ladder blocking, saves lumber, and provides insulation backing","Header sizing: consult the span tables in the IRC or your local code — undersized headers cause sagging and door/window binding"]},
    {id:"cf3",title:"Floor Framing — Beams, Joists, Blocking & Sheathing",level:"new",dur:"18 min",desc:"Beam sizing and bearing length, joist layout (16\" OC), rim joists, blocking at mid-span, squash blocks at point loads, subfloor sheathing installation (APA rated, glue-nail method).",vid:"6cEbTBHLQ3E",
      notes:["Joist bearing: minimum 1-1/2\" on wood, 3\" on masonry — inadequate bearing is a structural defect","Rim joist: must be the same depth as the floor joists. Blocking fills in at the top plate to close the floor cavity","Mid-span blocking eliminates joist rotation — required when joist depth-to-thickness ratio exceeds IRC limits","Glue + nail subfloor: construction adhesive on top of each joist, then nail. This eliminates the single biggest cause of squeaky floors","Leave 1/8\" expansion gap between subfloor panels — without it, panels buckle when they swell from humidity"]},
    {id:"cf4",title:"Roof Framing — Ridge, Common Rafters & Bird's Mouth",level:"refresher",dur:"22 min",desc:"Roof pitch (rise over run), rafter length calculation (Pythagorean or rafter tables), ridge board sizing, plumb cut, seat cut (bird's mouth), tail cut, collar ties and ridge beam difference.",vid:"O9GjNGNHF2Q",
      notes:["Bird's mouth: the notch where the rafter sits on the top plate. Seat cut depth must not exceed 1/3 of the rafter depth — deeper weakens the rafter","Rafter length formula: unit length (from rafter tables) × total run. Or: √(rise² + run²). Both give the same answer","Ridge board vs ridge beam: a ridge board is NOT structural — the rafters push against each other and the ceiling joists act as ties. A ridge beam IS structural — it carries load and requires posts","Collar ties vs rafter ties: collar ties are in the upper third of the attic space, reduce rafter spread. Rafter ties (ceiling joists) are at the wall plate — they are structural and required by code","Overhang (tail): the rafter extends past the wall to create the eave. Tail length determines eave width"]},
    {id:"cf5",title:"Engineered Lumber — LVL, I-Joists & Parallam",level:"refresher",dur:"14 min",desc:"Why engineered lumber is used (longer spans, dimensional stability, no crown), LVL (Laminated Veneer Lumber) for headers and beams, I-joists for floor and roof framing, PSL/Parallam for columns.",vid:"_-TqxhfNMG4",
      notes:["LVL is stronger and more consistent than dimensional lumber — required for long-span headers over garages and wide openings","I-joist flanges are the structural element — never notch or drill through the flanges. Web holes must follow manufacturer's hole chart","Squash blocks: at any point load bearing on I-joists (post, beam above), install squash blocks to transfer load around the I-joist flange","LVL beams: multiple plies must be nailed together per the manufacturer spec — inadequate nailing means the plies act independently and fail at lower load","Store engineered lumber flat and covered — LVL twists and delaminates if left wet or stored on edge"]},
    {id:"cf6",title:"Sheathing — Wall, Roof & Subfloor",level:"new",dur:"12 min",desc:"APA rated sheathing, OSB vs plywood (when each is appropriate), nailing schedule (6\" edge, 12\" field), shear wall nailing upgrades, H-clips for roof sheathing.",vid:"TMH5YWPz3Qo",
      notes:["APA rating: 32/16 means rated for 32\" roof rafter span or 16\" floor joist span. Match the rating to your framing spacing","OSB vs plywood: OSB is adequate for most framing applications and cheaper. Plywood is better in wet conditions — OSB swells at edges when repeatedly wet","Shear wall nailing: standard is 6\"/12\" (edge/field). Seismic/wind upgrades may require 4\"/6\" or 3\"/3\" — this must match the shear wall schedule on the plans","H-clips between roof sheathing panels (at unsupported edges) eliminate edge bounce and are required when rafters are 24\" OC","Always nail sheathing with the panel strength axis perpendicular to supports — the long direction across the framing"]},
  ]},
  {id:"c_doors",title:"Doors, Windows & Stairs",icon:"🚪",color:"#8a5020",lessons:[
    {id:"cd1",title:"Prehung Door Installation — Interior",level:"new",dur:"16 min",desc:"Rough opening prep, setting the door plumb and level in 3D, shimming the hinge side first, fastener placement, checking swing and latch before casing.",vid:"pLHbwdqMpM0",
      notes:["Plumb and level in 3D: the door must be plumb side-to-side AND front-to-back — a twisted frame causes binding","Hinge side first: shim and fasten the hinge side plumb before touching the latch side — every door installation starts here","Reveal: the gap between the door slab and frame (door stop) should be consistent — 1/8\" all around. Uneven reveal = twisted frame","Long screws through hinge into framing: replace the short hinge screws (3/4\") with 3\" screws that reach the king stud — this prevents hinge-side sag","Never nail through the hinge side of the frame before checking swing — if the frame is out of plumb, the door won't close properly"]},
    {id:"cd2",title:"Exterior Door Installation — Weather, Threshold & Flashing",level:"refresher",dur:"18 min",desc:"Sill pan flashing, door unit leveling, exterior sealant sequence (sides and top only — never bottom), threshold adjustment, weatherstripping types.",vid:"kpF3TjEKh_U",
      notes:["Sill pan: a sloped pan under the door sill diverts any water that gets past the threshold to the outside. Critical — skip this and water will rot the subfloor","Never caulk the bottom of an exterior door frame — water that gets in must have a way out. Caulk sides and top only","Threshold: adjust so the door compresses the weatherstrip but doesn't drag on flooring — usually 3-5 turns of adjustment screw","Flashing integration: door flashing must lap over the WRB (weather-resistive barrier) below and under the WRB above — water management is the priority","Foam insulation around door frame: use low-expansion window and door foam only — standard expanding foam bows the frame and causes binding"]},
    {id:"cd3",title:"Window Installation — Flanged & Brick Mold",level:"refresher",dur:"16 min",desc:"Rough opening size, sill pan flashing, flanged window installation sequence, self-adhering membrane at sill and jambs, flashing tape at head, nailing flange, checking plumb/level/square.",vid:"UBMGRMrFAiE",
      notes:["Flashing sequence (the most critical step): sill first, then jambs overlapping sill, then head flashing over everything — water always drains down","Self-adhering membrane at the sill: must be fully adhered — any bubbles or gaps allow water to wick under the window","Shimming: shim at hinge/latch points and at each corner — check both diagonal measurements to ensure window is square (equal diagonals = square)","Nailing flange: fasten at every hole provided. Do NOT over-drive nails through the flange — cracked flange is a leak waiting to happen","Foam around window: low-expansion foam only — standard foam will bow the frame and prevent operation"]},
    {id:"cd4",title:"Stair Layout — Rise, Run, Stringer & Code",level:"refresher",dur:"20 min",desc:"Total rise measurement, calculating number of risers (total rise ÷ 7.75\" target), adjusting rise to exact equal increments, run calculation, stringer layout with framing square, IRC stair code requirements.",vid:"bVzH_H0p5b8",
      notes:["IRC stair code: max riser height 7-3/4\", min tread depth 10\", min width 36\". Variation between tallest and shortest riser must not exceed 3/8\"","Rise calculation: measure total rise precisely. Divide by 7.75 (target), round to nearest whole number = number of risers. Divide total rise by that number = exact riser height","The bottom riser is always 1 tread thickness shorter if treads are applied after stringer is set — beginners always forget this","Stringer notch depth: the vertical cut (riser) and horizontal cut (tread) must not leave less than 3-1/2\" of effective stringer depth — check this before cutting","Handrail: required when stair has 4 or more risers. Height 34\"–38\" measured vertically from tread nosing. Graspable profile required by code"]},
    {id:"cd5",title:"Stair Treads & Risers — Installation & Fixing Squeaks",level:"refresher",dur:"14 min",desc:"Tread material selection, nosing overhang (1\" to 1-1/4\"), glue-nail method, installing risers before treads, squeak prevention and repair from above and below.",vid:"UxhQ6HdlHeo",
      notes:["Glue every tread and riser contact point — construction adhesive between tread and stringer, riser and stringer, tread and riser face","Squeak causes: tread rubbing on riser, nail popping out, wood shrinkage. Fix from below: block at tread-riser joint, or drive screw through riser into tread","Nosing overhang: 1\" to 1-1/4\" by IRC. More than 1-1/4\" is a trip hazard; less than 3/4\" doesn't meet code","Treads: use hardwood or stair-grade material. Standard lumber (2x12) will crack at the nosing from foot impact over time","Pre-drill all tread fasteners — splitting a tread at installation is an expensive mistake"]},
  ]},
  {id:"c_finish",title:"Finish Carpentry & Trim",icon:"✏️",color:"#7a6830",lessons:[
    {id:"cf_1",title:"Baseboard Installation — Joints, Cope & Return",level:"new",dur:"14 min",desc:"Inside corners: cope vs miter. Outside corners: miter sequence and angles. Returns at door casings. Scribing baseboard to uneven floors. Nailing height to avoid pipes.",vid:"GEeAcmhI-q4",
      notes:["Cope inside corners — never miter inside corners. Miters open as wood moves; copes stay tight","Cope sequence: run the first piece square into the corner. Miter the second piece at 45°, then cope along the profile with a coping saw or oscillating tool","Outside corner miter: cut both pieces at 45°. Pre-drill and glue the joint. Drive finish nails through the face of both pieces — never rely on the miter alone","Scribe to floor: if the floor is uneven, use a compass to scribe the bottom of the baseboard to the floor profile, then cut and sand","Nail location: 1\" from the bottom (into the plate) and at mid-height (into the stud). Mark stud locations before starting — don't fish for studs while holding trim"]},
    {id:"cf_2",title:"Door Casing — Reveal, Miter & Back Saw",level:"new",dur:"12 min",desc:"Setting the reveal (3/16\" to 1/4\" from inside edge of door frame), marking reveal with a combination square, mitering the head and side casings, back-cutting for tight miters, nailing sequence.",vid:"YCrCl43Rg3E",
      notes:["Reveal: set your combination square to 3/16\" and scribe a light mark around the entire door frame — the casing aligns to this line, not the frame edge","Miter sequence: cut the head piece first with 45° miters on both ends. Then cut side pieces — mark from the reveal line, not the floor","Back-cut the miter: tilt the miter saw 1° past 45° on the back face. This ensures the outside point makes contact first — a flat miter gaps at the point","Nail the casing to the frame first (small nails, 18-gauge), then nail into the framing (15-gauge finish nails). This keeps the casing tight to the frame","Gaps at miter: add a thin bead of wood glue before nailing. If the gap is larger than 1/16\", recut — caulk and paint will not hide a bad miter"]},
    {id:"cf_3",title:"Crown Molding — Spring Angle, Copes & Outside Corners",level:"refresher",dur:"18 min",desc:"Understanding spring angle (38° and 45° are most common), cutting crown flat on the saw table, inside corners (cope — never miter), outside corners (miter sequence), scribing to ceiling.",vid:"iFqerSRsHAE",
      notes:["Spring angle: the angle at which crown sits against the wall and ceiling. 38/52 and 45/45 are the two most common — do NOT mix spring angles on the same room","Cutting crown FLAT: lay crown upside-down on the saw table with the ceiling edge against the fence and the wall edge on the table. This converts the spring angle math for you","Cope inside corners — every time, no exceptions. A mitered inside corner will open a visible gap within months as the wood moves","Outside corner: both pieces miter at 45°. This is the only time you DO miter crown. Undercut the miter by 1° so the face edge contacts first","If the ceiling is out of level: scribing crown is complex. Consider a flat paint caulk line at the ceiling — many professionals do this on out-of-level ceilings"]},
    {id:"cf_4",title:"Hardwood Floor Installation — Layout, Nailing & Acclimation",level:"refresher",dur:"20 min",desc:"Acclimation requirements (3-7 days, 30-50% RH), layout line (never start parallel to a wall — snap a true line), underlayment, first row (face nail), racking, blind nailing with flooring nailer.",vid:"IwmcNbmtBfQ",
      notes:["Acclimation is not optional — install hardwood before it has acclimated and it will either buckle (if too wet) or gap (if too dry)","Layout: snap a line 30\" from the longest straight wall. Start here — never trust a wall to be straight enough to start from","Moisture test the subfloor before installing: max 12% MC in the subfloor with a pin meter, or follow manufacturer spec","First two rows are face-nailed (nails covered by baseboard). All subsequent rows are blind-nailed through the tongue with a flooring nailer","Racking: stagger end joints at least 6\" between adjacent rows. Avoid H-joints (end joints lining up across two rows) — they are both weak and ugly","Expansion gap: leave 3/4\" gap at all walls and vertical obstructions. Hardwood expands across the grain — not along it — and it WILL expand"]},
    {id:"cf_5",title:"Cabinet Installation — Level, Plumb & Scribe",level:"refresher",dur:"16 min",desc:"Finding the high point of the floor, establishing a level reference line, shimming base cabinets, scribing to walls, hanging wall cabinets with ledger board, fastener location.",vid:"RrxlG1m0EO0",
      notes:["High point of floor: use a level or laser to find the highest point in the room. All cabinets reference from here — shim up from the high point, never down","Ledger board: a temporary level board screwed to the wall at the correct height for the bottom of upper cabinets. Saves you from holding cabinets while fastening — essential","Scribing: if a cabinet end meets a wall that is out of plumb, use a compass to scribe the profile onto a filler strip, cut and sand to fit — never force a cabinet out of plumb to meet a wall","Fasteners into studs: 2-1/2\" to 3\" screws through the cabinet rail into wall studs. Upper cabinets hold significant load — always hit studs","Shim base cabinets before installing doors and drawers — door gaps and drawer alignment are set by cabinet plumb, not by hardware adjustment"]},
    {id:"cf_6",title:"Wood Finishing — Prep, Sand & Topcoat",level:"new",dur:"14 min",desc:"Sanding sequence (80→120→180 for paint; 80→120→150→180→220 for stain/oil), grain raising before waterborne finish, stain application and wiping, topcoat types (lacquer, polyurethane, oil), between-coat scuff sanding.",vid:"VYhS-dPTmb8",
      notes:["Always sand with the grain — cross-grain scratches from 80 or 100-grit sand paper telegraph through stain and finish","Raise the grain before waterborne finish: wipe with damp cloth, let dry, sand with 220. Otherwise the first coat raises the grain and feels rough","Stain: apply liberally, let soak 3-5 min, wipe off the excess. The longer you leave it, the darker the color — but leaving too long causes uneven blotchiness","Between coats: scuff-sand with 320-grit or gray scotchbrite after each coat — just enough to knock off nibs, not to sand through","Lacquer vs polyurethane: lacquer dries fast (30 min recoat) and is easier to repair; polyurethane is harder and more water-resistant. Match finish to application"]},
  ]},
  {id:"c_fasteners",title:"Fasteners, Hardware & Structural Connectors",icon:"🔩",color:"#6a5828",lessons:[
    {id:"cfa1",title:"Nail Types & When to Use Each",level:"new",dur:"10 min",desc:"Common nail anatomy (sinker, box, framing, finish, roofing), nail sizing (penny system — 8d, 16d), hot-dip galvanized vs stainless for exterior, pneumatic nail gun settings.",vid:"lWL0jZaePAs",
      notes:["16d sinker (3-1/4\") is the standard framing nail. 8d (2-1/2\") for sheathing, 10d for LVL connections per spec","Hot-dip galvanized: required for ACQ pressure-treated lumber — bright nails corrode and fail within years in treated wood","Galvanic corrosion: never mix metals (aluminum nails in treated lumber, or stainless hardware with galvanized joist hangers) — one metal corrodes sacrificially","Pneumatic guns: set the depth so nails are flush — overdriven nails in sheathing reduce shear capacity; underdriven nails don't fully seat","Nail guns vs hand nailing: pneumatic guns drive faster but can bounce-fire. Keep finger off trigger until the gun is against the work"]},
    {id:"cfa2",title:"Screws — Structural vs Fastening vs Trim",level:"new",dur:"10 min",desc:"Structural screws (Simpson Strong-Tie, GRK) vs drywall vs deck vs trim head screws, drive types (Phillips vs square vs Torx), pilot holes in hardwood, stripping and how to avoid it.",vid:"T9lC75KfbUE",
      notes:["Drywall screws are NOT structural — they are brittle and snap in shear. Never use them for framing, ledger boards, or structural connections","Structural screws (GRK, Simpson SDS): rated for shear and tensile load. Can substitute for nails in many Simpson connector applications — check the load table","Pilot holes: always in hardwood and within 2\" of an end. Without a pilot hole you will split the wood or strip the screw","Torx (star drive) screws are worth the cost for finish work — Phillips strips under pressure; Torx doesn't","Deck screws: use stainless or coated (ACQ-rated) for exterior applications. Uncoated deck screws stain decks and fail in 3-5 years"]},
    {id:"cfa3",title:"Simpson Strong-Tie Connectors — Joist Hangers, Post Bases & Straps",level:"refresher",dur:"14 min",desc:"Selecting the correct hanger for joist size and species, nailing requirements (must use all holes with correct nail type), post bases (standoff vs direct-bearing), tension ties and hurricane clips.",vid:"_p0LFgNvCJI",
      notes:["Using any nail other than the specified connector nail (usually 10d × 1-1/2\" joist hanger nail) voids the load rating — do not use framing nails","All holes must be filled — leaving even one hole empty significantly reduces the connector's rated capacity","Post bases: standoff post bases keep the post bottom off concrete and away from moisture — critical in wet environments","Hurricane clips (H2.5, H10): connect rafter/truss to top plate. Required by code in high-wind regions; best practice everywhere","Never substitute a connector with one that 'looks similar' — load ratings vary enormously between similar-looking connectors. Verify the model number"]},
    {id:"cfa4",title:"Adhesives — Construction, PL Premium & Epoxy",level:"new",dur:"10 min",desc:"Construction adhesive (PL Premium, Liquid Nails) for subfloor and framing, wood glue (PVA) for joinery, two-part epoxy for repair and end-grain gaps, expanding foam for insulation and air sealing.",vid:"aTUmnLYpzMk",
      notes:["PL Premium is the professional standard for subfloor — it bonds green lumber, wet concrete, and treated wood that PVA glue won't adhere to","Wood glue (PVA): stronger than wood in long-grain to long-grain joints — a well-made glue joint will break the wood before the glue lets go","Epoxy for repair: mix accurately to the ratio. Off-ratio epoxy either stays tacky or is too brittle. Use it for end-grain sealing and rotted wood consolidation","Low-expansion foam for windows and doors. Standard expanding foam can exert enough pressure to bow a window frame and prevent operation","Subfloor adhesive: apply to the top of every joist in a continuous bead — don't spot-apply. If the panel goes down without glue, it will squeak forever"]},
  ]},
  {id:"c_advanced",title:"Advanced Carpentry & Jobsite Skills",icon:"🎯",color:"#5a4818",lessons:[
    {id:"ca1",title:"Reading Construction Drawings — Plans, Sections & Details",level:"new",dur:"16 min",desc:"Plan view vs section vs elevation vs detail, title block, scale bar, symbol legend, dimensions (overall to sub-dimensions), how to find the detail that matters for your scope of work.",vid:"mFAGSEe4NWk",
      notes:["Always read the title block first — sheet number, scale, revision date. An outdated revision is dangerous","Hierarchy: specifications override drawings; large-scale details override small-scale plans. When they conflict, ask the GC before proceeding","Dimensions: the overall dimension should equal the sum of the sub-dimensions. If they don't, there's an error — never guess, always ask for clarification","As-built drawings: mark your deviations from the plan on a set of drawings as you go. Future trades will need to know where you actually ran things","RFI (Request for Information): if anything on the plans is unclear or conflicts with site conditions, submit a written RFI before proceeding — verbal approvals don't protect you"]},
    {id:"ca2",title:"Jobsite Math — Fractions, Area & Board Feet",level:"new",dur:"12 min",desc:"Adding and subtracting fractions (the core of carpentry math), converting between fractions and decimals, calculating square footage, estimating board feet of lumber for a project.",vid:"kIuMVU8tA5k",
      notes:["Fractions in carpentry: always find a common denominator. 3/8\" + 9/16\" = 6/16\" + 9/16\" = 15/16\". Get this wrong and nothing fits","Board feet = (thickness in\" × width in\" × length in feet) ÷ 12. A 2×6×12' = 2 × 6 × 12 ÷ 12 = 12 board feet","Order lumber with 10-15% waste allowance for cutting and defects. More complex cuts (crown, hardwood floors) need 15-20% overage","Stair math: the most common jobsite calculation error. Work rise and run on paper before touching a framing square","Pythagorean theorem (3-4-5): to check a corner is square, measure 3' on one side, 4' on the other, and the diagonal should be exactly 5'. Scale up for larger layouts: 6-8-10 or 9-12-15"]},
    {id:"ca3",title:"Moisture & Wood Movement — Why Carpentry Fails",level:"refresher",dur:"14 min",desc:"Equilibrium moisture content (EMC), how wood moves across the grain (and why it barely moves along it), calculating seasonal movement, designing for wood movement in floors, doors and furniture.",vid:"nxGXXNdVGAE",
      notes:["Wood moves across the grain — a 12\" wide oak board can move 3/4\" seasonally in a dry climate. Design every joint to allow this movement","Along the grain: wood moves less than 1/100 of its cross-grain movement. This is why you can glue up a solid wood panel across the width","EMC: wood reaches equilibrium with the ambient RH. At 45% RH, wood stabilizes around 8% MC. At 75% RH, it's around 14% — 6% change = significant movement","Hardwood floors: the reason you need expansion gaps is seasonal movement. A floating floor with no gap will buckle — guaranteed","Exterior trim and doors: seal all 6 sides (including end grain) before installation. Unsealed end grain absorbs water 10x faster than face grain and causes premature paint failure"]},
    {id:"ca4",title:"Jobsite Safety — Cut Hazards, Falls & Housekeeping",level:"new",dur:"12 min",desc:"Power tool safety hierarchy (PPE is last resort), eye and hearing protection requirements for each tool, fall protection thresholds (6' in construction), extension cord ratings, housekeeping and trip hazard prevention.",vid:"PwnLO8Vb6bA",
      notes:["Safety hierarchy: eliminate the hazard first, then engineering controls, then PPE. A blade guard is engineering; safety glasses are PPE — both are required","Hearing protection: circular saws and routers cause permanent hearing loss with repeated exposure. Wear plugs or muffs every time — hearing doesn't grow back","Table saw injuries: the most dangerous stationary tool in the shop. Kickback launches material at 100+ mph. Always use the riving knife and blade guard","Fall protection: at 6' above ground (construction) or 4' above ground (general industry) fall protection is required — guardrails, harness, or safety net","Extension cords: use the correct AWG for the run length. A 100-foot 16AWG cord to a 15A tool drops voltage enough to burn out the motor. Use 12AWG for runs over 50 feet"]},
    {id:"ca5",title:"Layout for Multiple Trades — Coordination & Backing",level:"refresher",dur:"14 min",desc:"Rough-in coordination with plumbing and electrical, installing backing in walls for future fixtures (grab bars, TV mounts, handrails), MEP penetrations in framing, fire blocking requirements.",vid:"pnfh2N5gCfM",
      notes:["Backing for grab bars: 2x10 solid blocking between studs at 33-36\" AFF — install during framing, not after drywall","TV mount backing: a sheet of 3/4\" plywood behind drywall is the correct solution — metal stud framing cannot hold a TV mount in a standard stud bay","Fire blocking: required in framing cavities that exceed 10 feet in height or at floor-ceiling intersections in platform framing — horizontal 2x blocking","MEP coordination: mark all pipe and conduit locations on top plate before framing is covered. Future trades need to drill through your framing — tell them where the structural members are","ADA compliance: if the project is commercial or multifamily, confirm ADA requirements for door widths (32\" clear min), hardware height, and accessible route before framing"]},
  ]},
];

const TRADE_CONFIG = {
  plumb:{icon:'🔧',label:'FM&O Plumbing Training',modules:PLUMB_MODULES,quizzes:PLUMB_QUIZZES,noteIcon:'📋 Technical Notes'},
  auto: {icon:'🔩',label:'Auto Mechanic Training',modules:AUTO_MODULES,quizzes:AUTO_QUIZZES,noteIcon:'🔩 Shop Notes'},
  elec: {icon:'⚡',label:'Electrical Training',modules:ELEC_MODULES,quizzes:ELEC_QUIZZES,noteIcon:'⚡ Electrical Notes'},
  niag: {icon:'🖥️',label:'Tridium Niagara Training',modules:NIAG_MODULES,quizzes:NIAG_QUIZZES,noteIcon:'🖥️ Niagara Notes'},
  carp: {icon:'🪵',label:'Carpentry Training',modules:CARP_MODULES,quizzes:CARP_QUIZZES,noteIcon:'🪵 Carpenter Notes'},
};

let trade = 'plumb';
let MODULES = PLUMB_MODULES;
let QUIZZES = PLUMB_QUIZZES;

const DEFAULT_PROG = '{"plumb":{"done":[],"quiz":[]},"auto":{"done":[],"quiz":[]},"elec":{"done":[],"quiz":[]},"niag":{"done":[],"quiz":[]},"carp":{"done":[],"quiz":[]}}';
let allProg = JSON.parse(localStorage.getItem('ts4_prog') || DEFAULT_PROG);
['plumb','auto','elec','niag','carp'].forEach(k=>{ if(!allProg[k]) allProg[k]={done:[],quiz:[]}; });
let prog = allProg[trade];
let lvl='all', openMod=null, qAns={}, qSub=false, curLesson=null;

function save(){ allProg[trade]=prog; localStorage.setItem('ts4_prog',JSON.stringify(allProg)); }

function switchTrade(t){
  trade=t;
  const cfg=TRADE_CONFIG[t];
  MODULES=cfg.modules; QUIZZES=cfg.quizzes;
  prog=allProg[t];
  openMod=null; qAns={}; qSub=false; curLesson=null;
  document.body.className=t;
  document.getElementById('header-icon').textContent=cfg.icon;
  document.getElementById('header-sub').textContent=cfg.label;
  ['plumb','auto','elec','niag','carp'].forEach(k=>{
    document.getElementById('btn-'+k).classList.toggle('active',k===t);
  });
  const at=document.querySelector('.tab.active').id.replace('tab-','');
  ({home:renderHome,learn:renderLearn,quiz:renderQuiz,progress:renderProgress}[at])();
}

function dayOfYear(){ const n=new Date(); return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000); }
function weekNum(){ const n=new Date(),s=new Date(n.getFullYear(),0,1); return Math.ceil(((n-s)/86400000+s.getDay()+1)/7); }
function dailyLesson(){ const a=MODULES.flatMap(m=>m.lessons); return a[dayOfYear()%a.length]; }
function getQuiz(w){ return QUIZZES[(w-1)%QUIZZES.length]; }
function lessonById(id){ return MODULES.flatMap(m=>m.lessons).find(l=>l.id===id); }

function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  ({home:renderHome,learn:renderLearn,quiz:renderQuiz,progress:renderProgress}[name])();
}

// ── MODAL ──────────────────────────────────────────────────
function openLesson(id){
  curLesson=lessonById(id); if(!curLesson) return;
  document.getElementById('modal-title').textContent=curLesson.title;
  document.getElementById('modal-dur').textContent='⏱ '+curLesson.dur;
  document.getElementById('modal-desc').textContent=curLesson.desc;
  const lc=curLesson.level==='new'?'#7bc47f':'#4a9eca';
  document.getElementById('modal-badge').innerHTML=`<span class="modal-badge" style="background:${lc}22;color:${lc};border:1px solid ${lc}44">${curLesson.level==='new'?'FOUNDATIONAL':'EXPERIENCED'}</span>`;
  const notesEl=document.getElementById('modal-notes');
  const noteIcon=TRADE_CONFIG[trade].noteIcon;
  if(curLesson.notes&&curLesson.notes.length){
    notesEl.style.display='block';
    notesEl.innerHTML=`<div class="modal-notes-title">${noteIcon}</div><div class="modal-notes-body"><ul>${curLesson.notes.map(n=>`<li>${n}</li>`).join('')}</ul></div>`;
  } else { notesEl.style.display='none'; }
  const ytBtn=document.getElementById('yt-link');
  const noVid=document.getElementById('no-video');
  if(curLesson.vid){ ytBtn.style.display='block'; ytBtn.href='https://www.youtube.com/watch?v='+curLesson.vid; noVid.style.display='none'; }
  else { ytBtn.style.display='none'; noVid.style.display='block'; }
  updateMarkBtn();
  document.getElementById('modal').classList.add('open');
  document.querySelector('.modal-inner').scrollTop=0;
}
function updateMarkBtn(){
  if(!curLesson) return;
  const done=prog.done.includes(curLesson.id);
  const mb=document.getElementById('mark-btn');
  mb.textContent=done?'✓  MARKED COMPLETE':'✓  MARK AS COMPLETE';
  mb.className=done?'mark-btn done':'mark-btn';
}
function markDone(){
  if(curLesson&&!prog.done.includes(curLesson.id)){ prog.done.push(curLesson.id); save(); updateMarkBtn(); }
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  const at=document.querySelector('.tab.active').id.replace('tab-','');
  ({home:renderHome,learn:renderLearn,progress:renderProgress}[at]||function(){})();
}
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

// ── HOME ──────────────────────────────────────────────────
function renderHome(){
  const d=dailyLesson();
  const m=MODULES.find(x=>x.lessons.some(l=>l.id===d.id));
  const tot=MODULES.flatMap(x=>x.lessons).length, dn=prog.done.length, wk=weekNum();
  const dt=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const trades=['plumb','auto','elec','niag','carp'];
  const tC={plumb:'#4a9eca',auto:'#e05c1a',elec:'#f0d030',niag:'#30c8a0',carp:'#c87941'};
  const tI={plumb:'🔧',auto:'🔩',elec:'⚡',niag:'🖥️',carp:'🪵'};
  const tL={plumb:'Pipe',auto:'Grease',elec:'Electric',niag:'Niagara',carp:'Carpentry'};
  const grandDone=trades.reduce((s,k)=>s+allProg[k].done.length,0);
  const grandTot=trades.reduce((s,k)=>s+TRADE_CONFIG[k].modules.flatMap(m=>m.lessons).length,0);

  let tiles='';
  trades.forEach(k=>{
    const kD=allProg[k].done.length, kT=TRADE_CONFIG[k].modules.flatMap(m=>m.lessons).length;
    tiles+=`<div style="border-radius:8px;padding:10px;text-align:center;background:${tC[k]}11;border:1px solid ${tC[k]}33;cursor:pointer" onclick="switchTrade('${k}')">
      <div style="font-size:14px">${tI[k]}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:${tC[k]}">${kD}/${kT}</div>
      <div style="font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase">${tL[k]}</div>
    </div>`;
  });

  let h=`<div style="background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">All 4 Trades — Combined Progress</div>
    <div style="background:#222;border-radius:4px;height:8px;overflow:hidden"><div style="height:100%;border-radius:4px;width:${Math.round(grandDone/grandTot*100)}%;background:linear-gradient(90deg,#4a9eca,#f0d030,#e05c1a,#30c8a0)"></div></div>
    <div style="color:#666;font-size:11px;margin-top:6px">${grandDone} of ${grandTot} lessons across all trades</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:10px">${tiles}</div>
  </div>
  <div class="card"><div class="card-hdr"><div class="daily-meta">TODAY'S LESSON · ${TRADE_CONFIG[trade].icon}</div><div style="font-size:11px;color:#555">${dt}</div></div>
  <div class="daily-inner">
    <button class="play-btn" onclick="openLesson('${d.id}')">▶</button>
    <div style="flex:1">
      <div class="daily-title">${d.title}</div>
      <div class="daily-sub">${d.dur} · ${m?m.title:''}</div>
      <div class="daily-desc">${d.desc}</div>
      <button class="btn-open" onclick="openLesson('${d.id}')">OPEN LESSON</button>
    </div>
  </div></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" style="color:#7bc47f">${dn}/${tot}</div><div class="stat-lbl">This Trade</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${prog.quiz.length}</div><div class="stat-lbl">Quizzes Passed</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#4a9eca">Wk ${wk}</div><div class="stat-lbl">This Week</div></div>
  </div>
  <div class="sec-lbl">Training Modules</div><div class="mod-grid">`;
  MODULES.forEach(mod=>{
    const d2=mod.lessons.filter(l=>prog.done.includes(l.id)).length;
    h+=`<div class="mod-card" onclick="goLearn('${mod.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:20px">${mod.icon}</span>
        <span style="color:${mod.color};font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700">${d2}/${mod.lessons.length}</span>
      </div>
      <div class="mod-card-title">${mod.title}</div>
      <div class="prog-bar-bg"><div class="prog-bar" style="width:${Math.round(d2/mod.lessons.length*100)}%;background:${mod.color}"></div></div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('tab-home').innerHTML=h;
}
function goLearn(id){ openMod=id; showTab('learn',document.querySelectorAll('.nav-btn')[1]); }

// ── LEARN ──────────────────────────────────────────────────
function renderLearn(){
  let h=`<div class="filter-row"><span class="filter-lbl">Level:</span>
    <button class="filter-btn ${lvl==='all'?'active':''}" onclick="setLvl('all')">ALL</button>
    <button class="filter-btn ${lvl==='new'?'active':''}" onclick="setLvl('new')">FOUNDATIONAL</button>
    <button class="filter-btn ${lvl==='refresher'?'active':''}" onclick="setLvl('refresher')">EXPERIENCED</button>
  </div>`;
  MODULES.forEach(mod=>{
    const ls=mod.lessons.filter(l=>lvl==='all'||l.level===lvl);
    if(!ls.length) return;
    const dn=ls.filter(l=>prog.done.includes(l.id)).length, op=openMod===mod.id;
    h+=`<div class="mod-hdr ${op?'open':''}" onclick="togMod('${mod.id}')" style="border-color:${op?mod.color+'55':'#2a2a2a'}">
      <span style="font-size:18px">${mod.icon}</span>
      <span class="mod-hdr-title">${mod.title}</span>
      <span style="color:${mod.color};font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700">${dn}/${ls.length}</span>
      <span style="color:#555;font-size:14px">${op?'▲':'▼'}</span>
    </div>`;
    if(op){
      h+=`<div class="lesson-list" style="border-color:${mod.color}33">`;
      ls.forEach(l=>{
        const c=prog.done.includes(l.id), lc=l.level==='new'?'#7bc47f':'#4a9eca';
        const hasN=l.notes&&l.notes.length;
        h+=`<div class="lesson-card" onclick="openLesson('${l.id}')">
          <div class="lcheck" style="background:${c?mod.color:'#2a2a2a'};color:${c?'#111':mod.color};border-color:${mod.color}44">${c?'✓':'▶'}</div>
          <div style="flex:1">
            <div class="ltitle">${l.title}</div>
            <div class="lmeta">${l.dur} · <span style="color:${lc}">${l.level==='new'?'Foundational':'Experienced'}</span>${hasN?' · <span style="color:var(--notes-color)">📋 Notes</span>':''}</div>
            <div class="ldesc">${l.desc.slice(0,110)}…</div>
          </div>
        </div>`;
      });
      h+='</div>';
    }
  });
  document.getElementById('tab-learn').innerHTML=h;
}
function setLvl(f){ lvl=f; renderLearn(); }
function togMod(id){ openMod=openMod===id?null:id; renderLearn(); }

// ── QUIZ ──────────────────────────────────────────────────
function renderQuiz(){
  const wk=weekNum(), quiz=getQuiz(wk), done=prog.quiz.includes(wk);
  let h=`<div class="card" style="margin-bottom:12px"><div style="padding:14px 16px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:#555;letter-spacing:2px;text-transform:uppercase">Weekly Quiz · ${TRADE_CONFIG[trade].icon} ${TRADE_CONFIG[trade].label}</div>
    <div style="color:#aaa;font-size:13px;margin-top:4px">8 rotating topics · New quiz every week · Pass = 3 of 5</div>
  </div></div>`;
  if(done&&!qSub){
    h+=`<div style="background:#1a2a1a;border:1px solid #4a7a4a;border-radius:10px;padding:20px;text-align:center;margin-bottom:12px">
      <div style="font-size:32px">✅</div>
      <div style="color:#7bc47f;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;margin-top:8px">Week ${wk} Complete!</div>
      <div style="color:#666;font-size:13px;margin-top:4px">New quiz posts next week.</div></div>`;
  } else {
    h+=`<div class="card"><div class="quiz-hdr"><div class="quiz-title">WEEK ${wk} — ${quiz.topic.toUpperCase()}</div><div class="quiz-sub">5 questions · Pass = 3 of 5 correct</div></div><div class="quiz-body">`;
    quiz.questions.forEach((q,qi)=>{
      h+=`<div><div class="q-text">${qi+1}. ${q.q}</div>`;
      q.opts.forEach((o,oi)=>{
        let c='q-opt';
        if(qSub){ if(oi===q.a) c+=' correct'; else if(qAns[qi]===oi) c+=' wrong'; }
        else if(qAns[qi]===oi) c+=' sel';
        h+=`<div class="${c}" onclick="${qSub?'':'selAns('+qi+','+oi+')'}">${o}</div>`;
      });
      h+='</div>';
    });
    const allDone=Object.keys(qAns).length>=quiz.questions.length;
    if(!qSub){ h+=`<button class="sub-btn" ${allDone?'':'disabled'} onclick="subQuiz()">SUBMIT ANSWERS</button>`; }
    else {
      const sc=quiz.questions.filter((q,i)=>qAns[i]===q.a).length, pass=sc>=3;
      h+=`<div class="result-box" style="background:${pass?'#1a2a1a':'#2a1a1a'}">
        <div style="font-size:28px">${pass?'✅':'🔄'}</div>
        <div class="result-txt" style="color:${pass?'#7bc47f':'var(--accent)'}">${sc}/5 — ${pass?'PASSED':'REVIEW & RETRY NEXT WEEK'}</div>
      </div>`;
    }
    h+=`</div></div>`;
  }
  if(wk>1){
    h+=`<div class="sec-lbl" style="margin-top:4px">Previous Weeks</div>`;
    for(let w=wk-1;w>=Math.max(1,wk-6);w--){
      const pq=getQuiz(w),pd=prog.quiz.includes(w);
      h+=`<div class="past-q">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#ccc">Week ${w} — ${pq.topic}</div>
        <span class="badge" style="background:${pd?'#7bc47f22':'#33333322'};color:${pd?'#7bc47f':'#888'};border-color:${pd?'#7bc47f55':'#44444455'}">${pd?'PASSED':'MISSED'}</span>
      </div>`;
    }
  }
  document.getElementById('tab-quiz').innerHTML=h;
}
function selAns(qi,oi){ qAns[qi]=oi; renderQuiz(); }
function subQuiz(){
  qSub=true;
  const wk=weekNum(),quiz=getQuiz(wk),sc=quiz.questions.filter((q,i)=>qAns[i]===q.a).length;
  if(sc>=3&&!prog.quiz.includes(wk)){ prog.quiz.push(wk); save(); }
  renderQuiz();
}

  const trades=['plumb','auto','elec','niag','carp'];

  let tiles='';

      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:${tC[k]}">${kD}/${kT}</div>

      <div style="font-size:9px;color:#555;margin-top:2px">${allProg[k].quiz.length} quizzes passed</div>
    </div>`;
  });

  let h=`<div style="background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">All 4 Trades — Total Progress</div>
    <div style="background:#222;border-radius:4px;height:8px;overflow:hidden"><div style="height:100%;border-radius:4px;width:${Math.round(grandDone/grandTot*100)}%;background:linear-gradient(90deg,#4a9eca,#f0d030,#e05c1a,#30c8a0)"></div></div>
    <div style="color:#666;font-size:11px;margin-top:6px">${grandDone} of ${grandTot} total lessons · ${Math.round(grandDone/grandTot*100)}%</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:10px">${tiles}</div>
  </div>
  <div style="background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:18px;margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--accent)">${TRADE_CONFIG[trade].icon} ${TRADE_CONFIG[trade].label}</div>
    <div style="background:#222;border-radius:4px;height:10px;margin-top:12px;overflow:hidden"><div style="height:100%;border-radius:4px;width:${pct}%;background:var(--accent);transition:width 0.4s"></div></div>
    <div style="color:#888;font-size:13px;margin-top:8px">${dn} of ${tot} lessons complete — ${pct}%</div>
  </div>`;

  MODULES.forEach(mod=>{
    const d=mod.lessons.filter(l=>prog.done.includes(l.id)).length, p=Math.round(d/mod.lessons.length*100);
    h+=`<div style="background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#ddd">${mod.icon} ${mod.title}</div>
        <span style="color:${mod.color};font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700">${d}/${mod.lessons.length}</span>
      </div>
      <div style="background:#222;border-radius:4px;height:5px;margin-top:10px;overflow:hidden"><div style="height:100%;border-radius:4px;width:${p}%;background:${mod.color};transition:width 0.4s"></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">`;
    mod.lessons.forEach(l=>{
      const c=prog.done.includes(l.id);
      h+=`<span onclick="openLesson('${l.id}')" style="padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid ${c?mod.color+'55':'#333'};background:${c?mod.color+'22':'#222'};color:${c?mod.color:'#555'};cursor:pointer">${l.title.split(/[-–:]/)[0].trim().slice(0,20)}</span>`;
    });
    h+=`</div></div>`;
  });

  h+=`<button onclick="resetTrade()" style="background:none;border:1px solid #444;border-radius:8px;padding:12px;color:#666;font-size:13px;cursor:pointer;width:100%;margin-top:6px">Reset ${TRADE_CONFIG[trade].label} Progress</button>
      <button onclick="resetAll()" style="background:none;border:1px solid #5a1a1a;border-radius:8px;padding:12px;color:#8a4444;font-size:13px;cursor:pointer;width:100%;margin-top:6px">⚠ Reset ALL Progress — All 4 Trades</button>`;
  document.getElementById('tab-progress').innerHTML=h;
}
function resetTrade(){
  if(confirm('Reset '+TRADE_CONFIG[trade].label+' progress?')){
    allProg[trade]={done:[],quiz:[]}; prog=allProg[trade]; qAns={}; qSub=false; save(); renderProgress();
  }
}
function resetAll(){
  if(confirm('Reset ALL progress for ALL 4 trades? Cannot be undone.')){
    allProg={plumb:{done:[],quiz:[]},auto:{done:[],quiz:[]},elec:{done:[],quiz:[]},niag:{done:[],quiz:[]},carp:{done:[],quiz:[]}};
    prog=allProg[trade]; qAns={}; qSub=false; save(); renderProgress();
  }
}

renderHome();
</script>
</body>
</html>
